<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/styles.css">
<script>
if (!localStorage.getItem("isLoggedIn")) {
    window.location.href = "login.html";
}
</script>
</head>

<body>

<header class="bg-primary text-white text-center p-3">
    <h1>Student Profile</h1>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">📚 LearnSpace</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu"
            aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                <li class="nav-item"><a class="nav-link" href="quiz.html">Quiz</a></li>
                <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
                <li class="nav-item ms-2">
    <button class="btn btn-danger" onclick="logout()">Logout</button>
</li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-2">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="dashboard.html">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Profile</li>
        </ol>
    </nav>
</div>

<main class="container mt-4">
    <!-- Student Info Section -->
    <section class="card p-4 mb-4">
        <h3>Student Information</h3>
        <form id="studentInfoForm">
            <div class="mb-3">
                <label for="studentNameInput" class="form-label"><strong>Name:</strong></label>
                <input type="text" class="form-control" id="studentNameInput">
            </div>
            <div class="mb-3">
                <label for="studentEmailInput" class="form-label"><strong>Email:</strong></label>
                <input type="email" class="form-control" id="studentEmailInput">
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
        <div id="saveMessage" class="mt-2"></div>
    </section>

    <!-- Completed Courses -->
    <section class="card p-4 mb-4">
        <h3>Completed Courses</h3>
        <ul id="completedCoursesList"></ul>
    </section>

    <!-- Quiz Performance -->
    <section class="card p-4 mb-4">
        <h3>Quiz Performance</h3>
        <p>Your Latest Score:</p>
        <h4 id="profileQuizScore"></h4>
    </section>

    <!-- Learning Progress -->
    <section class="card p-4 mb-4">
        <h3>Learning Progress</h3>
        <progress id="profileProgress" value="0" max="100"></progress>
    </section>

    <!-- Reset Button -->
    <section class="card p-4 mt-4 text-center">
        <button id="resetProfileBtn" class="btn btn-danger">Reset Profile</button>
    </section>

</main>

<footer class="text-center p-3 bg-primary text-white mt-5">
    © 2026 Multi-Page E-Learning Platform | Developed by Meeniga Suseela
</footer>

<script src="js/profile.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
