<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="container mt-5 text-center">

    <h2>Login / Register</h2>

    <input type="text" id="name" placeholder="Enter Name" class="form-control mb-3">
    <input type="email" id="email" placeholder="Enter Email" class="form-control mb-3">
    <input type="password" id="password" placeholder="Enter Password" class="form-control mb-3">

    <button class="btn btn-primary" onclick="register()">Continue</button>

    <script>
async function register() {

    if (localStorage.getItem("isLoggedIn") === "true") {
        window.location.href = "dashboard.html";
    }
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!name || !email || !password) {
        alert("Please enter all fields");
        return;
    }

    try {
        const res = await fetch("http://localhost:5199/api/users/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                fullName: name,
                email: email,
                password: password
            })
        });

        if (res.ok) {
            const data = await res.json();

            // ✅ Store user
            localStorage.setItem("userId", data.userId);
            localStorage.setItem("studentName", data.fullName);
            localStorage.setItem("studentEmail", data.email);
            localStorage.setItem("isLoggedIn", "true");

            alert("Registered successfully!");
            window.location.href = "dashboard.html";
        }
        else if (res.status === 400) {

        alert("User already exists. Logging in...");

        // ✅ FETCH USER FROM BACKEND
        const userRes = await fetch(`http://localhost:5199/api/users/by-email?email=${email}`);

        if (userRes.ok) {
            const user = await userRes.json();

            localStorage.setItem("userId", user.userId); // ✅ IMPORTANT
            localStorage.setItem("studentName", user.fullName);
            localStorage.setItem("studentEmail", user.email);
            localStorage.setItem("isLoggedIn", "true");

            window.location.href = "dashboard.html";
        } else {
            alert("Failed to fetch user details");
        }
    }
}
    catch (err) {
        alert("Server error");
        console.error(err);
    }
}
</script>
</body>
</html>
